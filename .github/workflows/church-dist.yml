name: Church Distribution
on:
  push:
    branches:
      - "main"
      - "win"
      - "develop"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install libraries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev libasound2-dev mesa-common-dev --fix-missing

      - name: Install dependencies
        run: npm install

      - name: Build app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
        run: npm run dist

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          retention-days: 30

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Send Notification
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            CONTENT="🚀 **FreeShow - Word International** build successful! 📦\n\nInstallers are ready for download:\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            CONTENT="⚠️ **FreeShow - Word International** build failed!\n\nCheck the logs for errors:\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"$CONTENT\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
